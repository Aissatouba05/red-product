<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RED PRODUCT</title>
  <link rel="icon" type="image/png" href="images/Link → SVG.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <div class="bg-[url('images/bg1.jpeg')] bg-gray-800 bg-cover bg-center min-h-screen flex items-center justify-center relative">
    <div class="absolute inset-0 bg-black/65"></div>

    <div class="relative z-10 flex flex-col items-center gap-6">

      <div class="flex items-center gap-3">
        <img src="images/Link → SVG.png" alt="" class="W-4 h-6">
        <span class="font-bold text-white text-2xl tracking-wide">RED PRODUCT</span>
      </div>

      <div class="bg-white rounded-sm shadow-2xl w-80 px-4 py-7">

        <div class="mb-6">
          <h1 class="text-center text-sm">Inscrivez-vous en tant qu'Admin</h1>
        </div>

        <!-- Message succès -->
        <div id="msgSuccess" class="hidden bg-green-50 border border-green-300 text-green-700 text-xs rounded px-3 py-2 mb-4 text-center"></div>
        <!-- Message erreur -->
        <div id="msgError" class="hidden bg-red-50 border border-red-300 text-red-600 text-xs rounded px-3 py-2 mb-4 text-center"></div>

        <form class="flex flex-col gap-6" onsubmit="event.preventDefault(); handleRegister()">
          <div class="flex flex-col gap-1">
            <div class="flex items-center gap-2 border-b border-gray-200 focus-within:border-red-600 pb-2">
              <input id="nom" type="text" placeholder="Nom"
                class="flex-1 bg-transparent outline-none text-sm text-gray-800 placeholder-gray-400" required/>
            </div>
          </div>

          <div class="flex flex-col gap-1">
            <div class="flex items-center gap-2 border-b border-gray-200 focus-within:border-red-600 pb-2">
              <input id="email" type="email" placeholder="E-mail"
                class="flex-1 bg-transparent outline-none text-sm text-gray-800 placeholder-gray-400" required/>
            </div>
          </div>

          <div class="flex flex-col gap-1">
            <div class="flex items-center gap-2 border-b border-gray-200 focus-within:border-red-600 pb-2">
              <input id="pwd" type="password" placeholder="Mot de passe"
                class="flex-1 bg-transparent outline-none text-sm text-gray-800 placeholder-gray-400" required minlength="6"/>
            </div>
          </div>

          <button id="submitBtn" type="submit"
            class="bg-gray-700 hover:bg-black active:scale-95 text-white text-sm py-3 rounded-lg transition-all duration-200 mt-5">
            S'inscrire
          </button>
        </form>
      </div>

      <p class="text-white text-sm">
        Vous avez déjà un compte?
        <a href="index.html" class="text-yellow-500 font-bold">Se connecter</a>
      </p>
    </div>
  </div>

  <script>
    const API = 'https://red-product-back-jtx4.onrender.com';

    async function handleRegister() {
      const nom   = document.getElementById('nom').value.trim();
      const email = document.getElementById('email').value.trim();
      const pwd   = document.getElementById('pwd').value;
      const btn   = document.getElementById('submitBtn');
      const msgOk  = document.getElementById('msgSuccess');
      const msgErr = document.getElementById('msgError');

      msgOk.classList.add('hidden');
      msgErr.classList.add('hidden');

      btn.textContent = 'Inscription...';
      btn.disabled = true;

      try {
        const res = await fetch(`${API}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nom, email, password: pwd })
        });
        const data = await res.json();

        if (res.ok) {
          msgOk.textContent = '✅ Inscription réussie ! Vérifiez votre email pour activer votre compte.';
          msgOk.classList.remove('hidden');
          document.getElementById('nom').value   = '';
          document.getElementById('email').value = '';
          document.getElementById('pwd').value   = '';
        } else {
          msgErr.textContent = data.error || "Erreur lors de l'inscription.";
          msgErr.classList.remove('hidden');
        }
      } catch {
        msgErr.textContent = 'Erreur réseau / serveur.';
        msgErr.classList.remove('hidden');
      }

      btn.textContent = "S'inscrire";
      btn.disabled = false;
    }
  </script>
</body>
</html>
