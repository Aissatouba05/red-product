<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RED PRODUCT — Détail Hôtel</title>
  <link rel="icon" type="image/png" href="images/Link → SVG.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=dashboard" />
  <link rel="stylesheet" href="responsive.css">
</head>
<body class="bg-gray-100">

  <input type="checkbox" id="sidebar-toggle">
  <label for="sidebar-toggle" class="hamburger-btn">
    <i class="fa-solid fa-bars"></i>
  </label>
  <div class="sidebar-overlay" onclick="document.getElementById('sidebar-toggle').checked = false"></div>

  <!-- SIDEBAR -->
  <aside class="fixed">
    <div class="bg-[url('images/bg1.jpeg')] bg-cover bg-center w-[270px] relative h-[100vh]">
      <div class="w-[270px] h-[100vh] inset-0 bg-black/60">
        <div class="flex items-center gap-3 justify-center py-4">
          <img src="images/Link → SVG.png" alt="" class="W-4 h-6">
          <span class="font-bold text-white text-xl tracking-wide">RED PRODUCT</span>
        </div>
        <p class="text-sm text-white p-4">Principal</p>
        <div class="px-5 flex gap-3">
          <span class="material-symbols-outlined text-white text-2xl">dashboard</span>
          <a href="dashboard.html" class="py-1 text-white">Dashboard</a>
        </div>
        <div class="flex gap-3 bg-gray-100 px-2 py-2 mt-4">
          <div class="ml-3">
            <i class="fa-solid fa-desktop text-black-500 text-xl font-bold"></i>
            <a href="hotel.html" class="text-black-500 font-bold">Liste des hôtels</a>
          </div>
        </div>
        <div class="flex gap-2 p-8 mt-[120%] border-t-[1px] border-gray-500">
          <img id="sidebarPhoto" src="" alt="Photo"
            class="w-8 h-8 rounded-full aspect-square object-cover object-top cursor-pointer"
            onclick="openModalProfil()">
          <div>
            <h1 id="userNom" class="text-white">...</h1>
            <div class="flex gap-2 p-2">
              <div class="bg-green-500 rounded-full w-2 h-2 mt-2"></div>
              <p class="text-gray-400">En ligne</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </aside>

  <!-- HEADER -->
  <header class="fixed top-0 left-[270px] w-[calc(100vw-270px)] h-12 px-6 bg-white flex justify-between items-center z-50 shadow-sm">
    <div class="flex items-center gap-3">
      <a href="hotel.html" class="text-gray-500 hover:text-black transition text-lg">←</a>
      <h1 class="font-bold text-xl">Détail de l'hôtel</h1>
    </div>
    <div class="flex gap-4 items-center">
      <div class="flex gap-2 items-center">
        <div class="relative cursor-pointer" id="bellBtn">
          <i class="fa-regular fa-bell text-xl"></i>
          <span id="notifBadge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center">0</span>
        </div>
        <div id="notifDropdown" class="hidden absolute top-12 right-16 bg-white shadow-xl rounded-xl w-72 z-[200] border border-gray-100 max-h-80 overflow-y-auto">
          <div class="flex justify-between items-center px-4 py-3 border-b">
            <span class="font-semibold text-sm">Notifications</span>
            <button onclick="clearNotifs()" class="text-xs text-red-500 hover:underline">Tout effacer</button>
          </div>
          <div id="notifList" class="divide-y divide-gray-100">
            <p class="text-center text-gray-400 text-sm py-4">Aucune notification</p>
          </div>
        </div>
        <img id="headerPhoto" src="images/img1.jpeg" alt="Photo"
          class="w-8 h-8 rounded-full aspect-square object-cover object-top cursor-pointer"
          onclick="openModalProfil()">
        <input type="file" id="photoInput" accept="image/*" class="hidden">
        <a href="#" onclick="logout()"><i class="fa-solid fa-arrow-right-from-bracket text-xl"></i></a>
      </div>
    </div>
  </header>

  <!-- CONTENU DÉTAIL -->
  <main class="ml-[270px] pt-14 p-6">

    <!-- Skeleton loading -->
    <div id="skeleton" class="bg-white rounded-2xl shadow-md overflow-hidden max-w-3xl mx-auto animate-pulse">
      <div class="w-full h-72 bg-gray-200"></div>
      <div class="p-6 flex flex-col gap-4">
        <div class="h-6 bg-gray-200 rounded w-1/3"></div>
        <div class="h-4 bg-gray-200 rounded w-1/2"></div>
        <div class="h-4 bg-gray-200 rounded w-1/4"></div>
      </div>
    </div>

    <!-- Contenu réel (caché jusqu'au chargement) -->
    <div id="detailContent" class="hidden max-w-3xl mx-auto">

      <div class="bg-white rounded-2xl shadow-md overflow-hidden">
        <img id="detailImg" src="" alt="Hotel"
          class="w-full h-72 object-cover"
          onerror="this.src='https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800'">

        <div class="p-6">
          <div class="flex justify-between items-start mb-4">
            <div>
              <h1 id="detailNom" class="text-2xl font-bold text-gray-800"></h1>
              <p id="detailAdresse" class="text-red-600 text-sm mt-1"></p>
            </div>
            <span id="detailPrix" class="text-lg font-bold text-gray-800 bg-gray-100 px-4 py-2 rounded-xl"></span>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6 border-t border-gray-100 pt-6">
            <div class="flex flex-col gap-1">
              <span class="text-xs text-gray-400 uppercase tracking-wide font-medium">Email</span>
              <span id="detailEmail" class="text-sm text-gray-700"></span>
            </div>
            <div class="flex flex-col gap-1">
              <span class="text-xs text-gray-400 uppercase tracking-wide font-medium">Téléphone</span>
              <span id="detailTelephone" class="text-sm text-gray-700"></span>
            </div>
            <div class="flex flex-col gap-1">
              <span class="text-xs text-gray-400 uppercase tracking-wide font-medium">Devise</span>
              <span id="detailDevise" class="text-sm text-gray-700"></span>
            </div>
            <div class="flex flex-col gap-1">
              <span class="text-xs text-gray-400 uppercase tracking-wide font-medium">Description</span>
              <span id="detailDescription" class="text-sm text-gray-700"></span>
            </div>
          </div>

          <div class="flex justify-end gap-3 mt-8">
            <button id="btnSupprimer"
              class="bg-red-500 hover:bg-red-600 text-white px-6 py-2.5 rounded-xl text-sm font-medium transition">
              🗑 Supprimer
            </button>
            <button id="btnModifier"
              class="bg-gray-800 hover:bg-gray-700 text-white px-6 py-2.5 rounded-xl text-sm font-medium transition">
              ✏️ Modifier
            </button>
          </div>
        </div>
      </div>

    </div>

    <!-- Message erreur -->
    <div id="detailError" class="hidden text-center text-gray-400 mt-20">
      <i class="fa-solid fa-triangle-exclamation text-4xl mb-4"></i>
      <p>Hôtel introuvable.</p>
      <a href="hotel.html" class="text-gray-800 underline mt-2 inline-block">Retour à la liste</a>
    </div>

  </main>


  <!-- ===== MODAL MODIFIER ===== -->
  <div id="modalModifier"
      class="hidden fixed inset-0 bg-black/50 z-[60] flex items-center justify-center px-4 py-6 overflow-y-auto">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-[620px] p-6">
      <div class="flex items-center gap-3 pb-4 mb-6 border-b border-dashed border-[#DDDDDD]">
        <button onclick="closeModalModifier()" class="text-[#555555] text-[18px] hover:text-black transition">←</button>
        <h1 class="font-bold text-[18px] text-[#555555] tracking-wide">MODIFIER UN HÔTEL</h1>
      </div>
      <form id="editForm">
        <input type="hidden" id="editId">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
          <div class="flex flex-col gap-1">
            <label class="text-[14px] font-medium text-[#555555]">Nom de l'hôtel</label>
            <input type="text" id="editNom" class="border border-[#DDDDDD] rounded-xl px-4 py-3 text-[14px] outline-none focus:border-[#555555]">
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-[14px] font-medium text-[#555555]">Adresse</label>
            <input type="text" id="editAdresse" class="border border-[#DDDDDD] rounded-xl px-4 py-3 text-[14px] outline-none focus:border-[#555555]">
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-[14px] font-medium text-[#555555]">E-mail</label>
            <input type="email" id="editEmail" class="border border-[#DDDDDD] rounded-xl px-4 py-3 text-[14px] outline-none focus:border-[#555555]">
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-[14px] font-medium text-[#555555]">Numéro de téléphone</label>
            <input type="tel" id="editTelephone" class="border border-[#DDDDDD] rounded-xl px-4 py-3 text-[14px] outline-none focus:border-[#555555]">
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-[14px] font-medium text-[#555555]">Prix par nuit</label>
            <input type="number" id="editPrix" class="border border-[#DDDDDD] rounded-xl px-4 py-3 text-[14px] outline-none focus:border-[#555555]">
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-[14px] font-medium text-[#555555]">Devise</label>
            <select id="editDevise" class="border border-[#DDDDDD] rounded-xl px-4 py-3 text-[14px] outline-none focus:border-[#555555] bg-white">
              <option value="XOF">F XOF</option>
              <option value="EUR">Euro</option>
              <option value="USD">Dollar</option>
            </select>
          </div>
        </div>
        <div class="flex justify-end mt-6">
          <button type="submit" class="bg-[#333333] text-white px-8 py-3 rounded-xl text-[15px] font-medium hover:bg-[#555555] transition">
            Enregistrer
          </button>
        </div>
      </form>
    </div>
  </div>


  <!-- ===== MODAL PROFIL ===== -->
  <div id="modalProfil" class="hidden fixed inset-0 bg-black/50 z-[150] flex items-center justify-center px-4 py-6 overflow-y-auto">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6">
      <div class="flex items-center gap-3 pb-4 mb-5 border-b border-dashed border-gray-200">
        <button onclick="closeModalProfil()" class="text-gray-500 hover:text-black transition text-lg">←</button>
        <h2 class="font-bold text-gray-700 tracking-wide text-sm uppercase">Mon Profil</h2>
      </div>
      <div id="profilMsgErr" class="hidden bg-red-50 border border-red-300 text-red-600 text-xs rounded-lg px-3 py-2 mb-4 text-center"></div>
      <div id="profilMsgOk" class="hidden bg-green-50 border border-green-300 text-green-700 text-xs rounded-lg px-3 py-2 mb-4 text-center"></div>
      <form id="profilForm">
        <div class="flex flex-col items-center gap-3 mb-6">
          <img id="profilPhotoPreview" src="" alt="Photo" class="hidden w-20 h-20 rounded-full object-cover border-2 border-gray-200">
          <label for="profilPhotoInput" class="cursor-pointer text-sm text-gray-500 border border-gray-200 rounded-xl px-4 py-2 hover:bg-gray-50 transition flex items-center gap-2">
            <i class="fa-regular fa-image"></i> Changer la photo
          </label>
          <input type="file" id="profilPhotoInput" accept="image/*" class="hidden">
        </div>
        <div class="flex flex-col gap-4">
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-600">Nom</label>
            <input type="text" id="profilNom" class="border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:border-gray-500">
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-600">Email</label>
            <input type="email" id="profilEmail" class="border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:border-gray-500">
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-600">Nouveau mot de passe <span class="text-gray-400 font-normal">(optionnel)</span></label>
            <input type="password" id="profilPwd" placeholder="Laisser vide pour ne pas changer" class="border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:border-gray-500">
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-600">Confirmer le mot de passe</label>
            <input type="password" id="profilPwd2" class="border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:border-gray-500">
          </div>
        </div>
        <div class="flex justify-end mt-6">
          <button type="submit" class="bg-gray-800 hover:bg-gray-700 text-white px-6 py-2.5 rounded-xl text-sm font-medium transition">
            Enregistrer
          </button>
        </div>
      </form>
    </div>
  </div>


  <script src="detail.js"></script>
  <script src="profil.js"></script>

</body>
</html>
