<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Red Product — Nouveau mot de passe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <div class="bg-[url('images/bg1.jpeg')] bg-gray-800 bg-cover bg-center min-h-screen flex items-center justify-center relative">
    <div class="absolute inset-0 bg-black/65"></div>

    <div class="relative z-10 flex flex-col items-center gap-6">

      <div class="flex items-center gap-3">
        <i class="fa-regular fa-bookmark text-white text-2xl"></i>
        <span class="font-bold text-white text-2xl tracking-wide">RED PRODUCT</span>
      </div>

      <div class="bg-white rounded-sm shadow-2xl w-80 px-4 py-7">

        <div class="mb-8">
          <h1 class="text-center text-sm font-semibold">Nouveau mot de passe</h1>
          <p class="text-center text-xs text-gray-400 mt-2">Choisissez un nouveau mot de passe sécurisé.</p>
        </div>

        <!-- Message erreur token -->
        <div id="msgToken" class="hidden bg-red-50 border border-red-300 text-red-600 text-xs rounded px-3 py-2 mb-4 text-center">
          Lien invalide ou expiré. <a href="reset.html" class="underline font-semibold">Réessayer</a>
        </div>

        <!-- Message succès -->
        <div id="msgSuccess" class="hidden bg-green-50 border border-green-300 text-green-700 text-xs rounded px-3 py-2 mb-4 text-center">
          Mot de passe changé ! <a href="index.html" class="underline font-semibold">Se connecter</a>
        </div>

        <!-- Message erreur -->
        <div id="msgError" class="hidden bg-red-50 border border-red-300 text-red-600 text-xs rounded px-3 py-2 mb-4 text-center"></div>

        <form id="formReset" class="flex flex-col gap-6" onsubmit="event.preventDefault(); handleNewPassword()">

          <div class="flex flex-col gap-1">
            <div class="flex items-center gap-2 border-b border-gray-200 focus-within:border-red-600 pb-2">
              <input
                id="pwd"
                type="password"
                placeholder="Nouveau mot de passe"
                class="flex-1 bg-transparent outline-none text-sm text-gray-800 placeholder-gray-400"
                required
                minlength="6"
              />
              <i id="togglePwd" class="fa-regular fa-eye text-gray-400 cursor-pointer text-sm" onclick="toggleVisi('pwd', 'togglePwd')"></i>
            </div>
          </div>

          <div class="flex flex-col gap-1">
            <div class="flex items-center gap-2 border-b border-gray-200 focus-within:border-red-600 pb-2">
              <input
                id="pwd2"
                type="password"
                placeholder="Confirmer le mot de passe"
                class="flex-1 bg-transparent outline-none text-sm text-gray-800 placeholder-gray-400"
                required
                minlength="6"
              />
              <i id="togglePwd2" class="fa-regular fa-eye text-gray-400 cursor-pointer text-sm" onclick="toggleVisi('pwd2', 'togglePwd2')"></i>
            </div>
          </div>

          <button id="submitBtn" type="submit"
            class="bg-gray-700 hover:bg-black active:scale-95 text-white text-sm py-3 rounded-lg transition-all duration-200 mt-5">
            Changer le mot de passe
          </button>

        </form>
      </div>

      <a href="index.html" class="text-yellow-500 text-[15px] font-bold">← Retour à la connexion</a>

    </div>
  </div>

  <script src="new-password.js"></script>

</body>
</html>
