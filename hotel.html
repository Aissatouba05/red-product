
 <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=dashboard" />
   <link rel="stylesheet" href="dashboard.css">
</head>
<body class="bg-gray-100">
  <input type="checkbox" id="sidebar-toggle">
  <label for="sidebar-toggle" class="hamburger-btn">
    <i class="fa-solid fa-bars"></i>
  </label>
  <div class="sidebar-overlay" onclick="document.getElementById('sidebar-toggle').checked = false"></div>

  <!-- SIDEBAR -->
  <aside class="fixed">
    <div class="bg-[url('images/bg1.jpeg')] bg-cover bg-center w-[270px] relative h-[100vh]">
      <div class="w-[270px] h-[100vh] inset-0 bg-black/60">

        <div class="flex items-center gap-3 justify-center py-4">
          <i class="fa-regular fa-bookmark text-white text-2xl"></i>
          <span class="font-bold text-white text-xl tracking-wide">RED PRODUCT</span>
        </div>

        <p class="text-sm text-white p-4">Principal</p>

        <div class="px-5 flex gap-3">
          <span class="material-symbols-outlined text-white text-2xl">dashboard</span>
          <a href="dashboard.html" class="py-1 text-white">Dashboard</a>
        </div>

        <div class="flex gap-3 bg-gray-100 px-2 py-2 mt-4">
          <div class="ml-3">
            <i class="fa-solid fa-desktop text-black-500 text-xl font-bold"></i>
            <a href="hotel.html" class="text-black-500 font-bold">Liste des hôtels</a>
          </div>
        </div>

        <div class="flex gap-2 p-8 mt-[120%] border-t-[1px] border-gray-500">
          <img id="sidebarPhoto" src="images/img1.jpeg" alt="Photo" class="w-8 h-8 rounded-full aspect-square object-cover object-top cursor-pointer" onclick="document.getElementById('photoInput').click()">
          <div>
            <h1 id="userNom" class="text-white">...</h1>
            <div class="flex gap-2 p-2">
              <div class="bg-green-500 rounded-full w-2 h-2 mt-2"></div>
              <p class="text-gray-400">En ligne</p>
            </div>
          </div>
        </div>

      </div>
    </div>
  </aside>

  <!-- HEADER -->
  <header class="fixed top-0 left-[270px] w-[calc(100vw-270px)] h-12 px-6 bg-white flex justify-between items-center z-50 shadow-sm" id="header1">
    <h1 class="font-bold text-xl" id="dashboard">Dashboard</h1>
    <div class="flex gap-4 items-center">
      <div class="relative">
        <input type="text" id="search" placeholder="Rechercher"
          class="pl-10 pr-2 py-1 border border-gray-300 rounded-2xl">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-2 text-gray-400 text-sm" id="icone"></i>
      </div>
      <div class="flex gap-2 items-center">
        <!-- CLOCHE NOTIFICATION -->
        <div class="relative cursor-pointer" id="bellBtn">
          <i class="fa-regular fa-bell text-xl"></i>
          <span id="notifBadge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center">0</span>
        </div>
        <!-- DROPDOWN NOTIFICATIONS -->
        <div id="notifDropdown" class="hidden absolute top-12 right-16 bg-white shadow-xl rounded-xl w-72 z-[200] border border-gray-100 max-h-80 overflow-y-auto">
          <div class="flex justify-between items-center px-4 py-3 border-b">
            <span class="font-semibold text-sm">Notifications</span>
            <button onclick="clearNotifs()" class="text-xs text-red-500 hover:underline">Tout effacer</button>
          </div>
          <div id="notifList" class="divide-y divide-gray-100">
            <p class="text-center text-gray-400 text-sm py-4">Aucune notification</p>
          </div>
        </div>
        <!-- PHOTO PROFIL (cliquable) -->
        <img id="headerPhoto" src="images/img1.jpeg" alt="Photo" class="w-8 h-8 rounded-full aspect-square object-cover object-top cursor-pointer" onclick="document.getElementById('photoInput').click()">
        <!-- INPUT CACHÉ POUR CHANGER LA PHOTO -->
        <input type="file" id="photoInput" accept="image/*" class="hidden">
        <a href="#" onclick="logout()"><i class="fa-solid fa-arrow-right-from-bracket text-xl"></i></a>
      </div>
    </div>
  </header>

  <!-- BARRE TITRE + BOUTON -->
  <div class="ml-[270px] pt-10" id="lorem">
    <div class="bg-white h-20 p-7 flex justify-between items-center">
      <h1 class="text-2xl">Hôtels <span id="hotelCount" class="text-gray-300 text-2xl">0</span></h1>
      <button id="openModal" class="border rounded-xl px-5 py-3 flex items-center justify-center gap-2 text-sm">
        + Ajouter un nouveau hôtel
      </button>
    </div>
  </div>

  <!-- GRILLE DES HÔTELS -->
  <div id="hotel" class="ml-[270px] grid grid-cols-2 
         sm:grid-cols-1 
         md:grid-cols-2 
         lg:grid-cols-4 
         gap-4 p-6">
  </div>
  <p id="noResults" class="hidden ml-[270px] text-center text-gray-400 py-10 text-sm">Aucun hôtel trouvé.</p>
  <!-- PAGINATION -->
  <div id="pagination" class="ml-[270px] flex gap-2 px-6 pb-6 flex-wrap"></div>


  <!-- ===== MODAL AJOUTER ===== -->
  <div id="modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] hidden px-4 py-6 overflow-y-auto">
    <div class="bg-white rounded-2xl shadow-xl p-6 w-fit max-h-[90vh] overflow-y-auto my-auto">
      <div class="flex gap-3 border-b-2 border-dotted border-black p-3 mb-2">
        <button id="closeModal"><i class="fas fa-arrow-left p-1"></i></button>
        <h1 class="font-semibold">CRÉER UN NOUVEAU HÔTEL</h1>
      </div>
      <div class="flex gap-10">
        <div class="flex flex-col gap-2 p-4">
          <label>Nom de l'hôtel</label>
          <input id="addNom" type="text" placeholder="CAP Mamiane" class="border w-64 p-1 rounded-xl">
          <label>E-mail</label>
          <input id="addEmail" type="email" placeholder="information@gmail.com" class="border w-64 p-1 rounded-xl">
          <label>Prix par nuit</label>
          <input id="addPrix" type="number" placeholder="25 000 XOF" class="border w-64 p-1 rounded-xl">
        </div>
        <div class="flex flex-col gap-2 p-4">
          <label>Adresse</label>
          <input id="addAdresse" type="text" placeholder="Les listes du Saloum, Mar Lodj" class="border w-64 p-1 rounded-xl">
          <label>Numero</label>
          <input id="addNumero" type="text" placeholder="+221 777 77 77" class="border w-64 p-1 rounded-xl">
          <label>Devise</label>
          <select id="addDevise" class="border w-64 p-1 rounded-xl">
            <option value="XOF">F XOF</option>
            <option value="EUR">Euro</option>
            <option value="USD">Dollar</option>
          </select>
        </div>
      </div>
      <div class="flex flex-col gap-2
      
      p-3">
        <label>Photo de l'hôtel</label>
        <input id="addImage" type="file" accept="image/*" class="border w-full py-6 rounded-xl">
        <img id="addImagePreview" src="" alt="" class="hidden w-full h-32 object-cover rounded-xl mt-1">
      </div>
      <div class="ml-[79%] mt-2">
        <button id="saveHotelBtn" class="p-2 px-5 bg-gray-600 text-white rounded-xl">Enregistrer</button>
      </div>
    </div>
  </div>


  <!-- ===== MODAL DÉTAILS ===== -->
  <div id="modalDetails"
      class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center px-4 py-6 overflow-y-auto">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-[620px] p-6">
      <div class="flex items-center gap-3 pb-4 mb-6 border-b border-dashed border-[#DDDDDD]">
        <button onclick="closeModalDetails()" class="text-[#555555] text-[18px] hover:text-black transition">←</button>
        <h1 class="font-bold text-[18px] text-[#555555] tracking-wide">DÉTAILS DE L'HÔTEL</h1>
      </div>
      <img id="detailPhoto" src="" class="w-full h-[200px] object-cover rounded-xl mb-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
          <span class="text-[12px] text-[#AAAAAA] font-medium">Nom</span>
          <span id="detailNom" class="text-[15px] font-semibold text-[#333333]"></span>
        </div>
        <div class="flex flex-col gap-1">
          <span class="text-[12px] text-[#AAAAAA] font-medium">Adresse</span>
          <span id="detailAdresse" class="text-[15px] text-[#333333]"></span>
        </div>
        <div class="flex flex-col gap-1">
          <span class="text-[12px] text-[#AAAAAA] font-medium">Email</span>
          <span id="detailEmail" class="text-[15px] text-[#333333]"></span>
        </div>
        <div class="flex flex-col gap-1">
          <span class="text-[12px] text-[#AAAAAA] font-medium">Téléphone</span>
          <span id="detailTelephone" class="text-[15px] text-[#333333]"></span>
        </div>
        <div class="flex flex-col gap-1">
          <span class="text-[12px] text-[#AAAAAA] font-medium">Prix</span>
          <span id="detailPrix" class="text-[15px] text-[#8D4B38] font-semibold"></span>
        </div>
       
      </div>
      <div class="flex justify-end gap-3 mt-6">
        <button id="btnSupprimerDetail"
          class="bg-red-500 text-white px-6 py-3 rounded-xl text-[15px] font-medium hover:bg-red-600 transition">
           Supprimer
        </button>
        <button id="btnModifierDetail"
          class="bg-[#333333] text-white px-6 py-3 rounded-xl text-[15px] font-medium hover:bg-[#555555] transition">
           Modifier
        </button>
      </div>
    </div>
  </div>


  <!-- ===== MODAL MODIFIER ===== -->
  <div id="modalModifier"
      class="hidden fixed inset-0 bg-black/50 z-[60] flex items-center justify-center px-4 py-6 overflow-y-auto">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-[620px] p-6">
      <div class="flex items-center gap-3 pb-4 mb-6 border-b border-dashed border-[#DDDDDD]">
        <button onclick="closeModalModifier()" class="text-[#555555] text-[18px] hover:text-black transition">←</button>
        <h1 class="font-bold text-[18px] text-[#555555] tracking-wide">MODIFIER UN HÔTEL</h1>
      </div>
      <form id="editForm">
        <input type="hidden" id="editId">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
          <div class="flex flex-col gap-1">
            <label class="text-[14px] font-medium text-[#555555]">Nom de l'hôtel</label>
            <input type="text" id="editNom" class="border border-[#DDDDDD] rounded-xl px-4 py-3 text-[14px] outline-none focus:border-[#555555]">
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-[14px] font-medium text-[#555555]">Adresse</label>
            <input type="text" id="editAdresse" class="border border-[#DDDDDD] rounded-xl px-4 py-3 text-[14px] outline-none focus:border-[#555555]">
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-[14px] font-medium text-[#555555]">E-mail</label>
            <input type="email" id="editEmail" class="border border-[#DDDDDD] rounded-xl px-4 py-3 text-[14px] outline-none focus:border-[#555555]">
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-[14px] font-medium text-[#555555]">Numéro de téléphone</label>
            <input type="tel" id="editTelephone" class="border border-[#DDDDDD] rounded-xl px-4 py-3 text-[14px] outline-none focus:border-[#555555]">
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-[14px] font-medium text-[#555555]">Prix par nuit</label>
            <input type="number" id="editPrix" class="border border-[#DDDDDD] rounded-xl px-4 py-3 text-[14px] outline-none focus:border-[#555555]">
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-[14px] font-medium text-[#555555]">Devise</label>
            <select id="editDevise" class="border border-[#DDDDDD] rounded-xl px-4 py-3 text-[14px] outline-none focus:border-[#555555] bg-white">
              <option value="XOF">F XOF</option>
              <option value="EUR">Euro</option>
              <option value="USD">Dollar</option>
            </select>
          </div>
        </div>
       
        <div class="flex justify-end mt-6">
          <button type="submit" class="bg-[#333333] text-white px-8 py-3 rounded-xl text-[15px] font-medium hover:bg-[#555555] transition">
            Enregistrer
          </button>
        </div>
      </form>
    </div>
  </div>


<script src="hotel.js"></script>

</body>
</html>
